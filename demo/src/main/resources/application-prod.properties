# 1. الاتصال المباشر وقراءة البيانات المباشرة بدون بليس هولدرز تسبب تضارب
spring.datasource.url=jdbc:mysql://junction.proxy.rlwy.net:56644/railway
spring.datasource.username=root
spring.datasource.password=1234

# 2. إعدادات السيرفر والـ Driver لـ Hibernate الحديث
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. محرك قاعدة البيانات
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. تحديد المنفذ الصحيح لـ Railway
server.port=${PORT:8080}